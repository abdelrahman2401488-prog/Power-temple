<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Power Temple</title>
  <link rel="stylesheet" href="../assets/css/variable.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/food.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <link rel="stylesheet" href="../assets/css/pro-theme.css" />
  <script src="../assets/js/api-mock.js" defer></script>
  <script src="../assets/js/auth.js" defer></script>
  <script src="../assets/js/main.js" defer></script>
</head>
<body data-page="login">
  <div class="app">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="../indexxx.html">
          <span class="brand-mark">PT</span>
          <span>Power Temple</span>
        </a>
        <nav class="nav">
          <a href="../indexxx.html">Home</a>
          <a class="active" href="login.html">Login</a>
        </nav>
      </div>
    </header>

    <main class="container auth-shell">
      <section class="auth-card fade-in" aria-label="Login form">
        <h1 class="auth-title">WELCOME BACK</h1>
        <p class="auth-subtitle">Sign in to your Power Temple account</p>

        <div class="auth-role-switch" role="tablist" aria-label="Account type">
          <button class="role-pill active" type="button" data-role-choice="admin">ADMIN</button>
          <button class="role-pill" type="button" data-role-choice="trainer">TRAINER</button>
          <button class="role-pill" type="button" data-role-choice="member">MEMBER</button>
        </div>

        <form id="loginForm" class="auth-form">
          <input id="loginRole" type="hidden" value="admin" />

          <label for="loginUsername">EMAIL ADDRESS</label>
          <input id="loginUsername" class="auth-input" type="text" placeholder="you@example.com" required />

          <label for="loginPassword">PASSWORD</label>
          <input id="loginPassword" class="auth-input" type="password" placeholder="••••••••" required />

          <button class="btn auth-submit" type="submit">Sign In →</button>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
