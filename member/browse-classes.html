<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Classes | Power Temple</title>
  <link rel="stylesheet" href="../assets/css/variable.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <link rel="stylesheet" href="../assets/css/pro-theme.css" />
  <script src="../assets/js/api-mock.js" defer></script>
  <script src="../assets/js/auth.js" defer></script>
  <script src="../assets/js/main.js" defer></script>
</head>
<body data-page="memberships">
  <div class="app">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="../index.html">
          <span class="brand-mark">PT</span>
          <span>Power Temple</span>
        </a>
        <nav class="nav" id="memberNav">
          <a href="../index.html">Home</a>
          <a href="../index.html#concept">Concept</a>
          <a href="../services.html">Services</a>
          <a href="../memberships.html">Memberships</a>
          <a href="browse-classes.html" class="active">Classes</a>
        </nav>
        <script>
          document.addEventListener('DOMContentLoaded', function () {
            if (typeof auth !== 'undefined' && auth.getCurrentUser && auth.getCurrentUser()?.role === 'member') {
              document.getElementById('memberNav').innerHTML = `
                <a href="membership.html">My Membership</a>
                <a href="browse-classes.html" class="active">Classes</a>
                <a href="my-bookings.html">My Bookings</a>
                <a href="personal-training.html">Personal Training</a>
                <a href="../shop.html">Shop</a>
                <a href="profile.html">Profile</a>
                <a href="../index.html">Logout</a>
              `;
            }
          });
        </script>
        <div class="header-actions" aria-label="Quick actions">
          <a class="header-icon-link" href="#login" title="Login" aria-label="Login" data-open-login-modal>
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 12.5c-2.62 0-4.75-2.13-4.75-4.75S9.38 3 12 3s4.75 2.13 4.75 4.75-2.13 4.75-4.75 4.75Zm0-8a3.25 3.25 0 1 0 0 6.5 3.25 3.25 0 0 0 0-6.5Z"></path>
              <path d="M19.25 21h-1.5v-1.25c0-2.62-2.13-4.75-4.75-4.75h-2c-2.62 0-4.75 2.13-4.75 4.75V21h-1.5v-1.25c0-3.45 2.8-6.25 6.25-6.25h2c3.45 0 6.25 2.8 6.25 6.25V21Z"></path>
            </svg>
            <span class="sr-only">Login</span>
          </a>
          <button class="header-icon-link header-cart-icon" type="button" title="Cart" aria-label="Cart">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M7.25 20.5a1.75 1.75 0 1 1 0-3.5 1.75 1.75 0 0 1 0 3.5Zm0-2a.25.25 0 1 0 0 .5.25.25 0 0 0 0-.5Zm9.5 2a1.75 1.75 0 1 1 0-3.5 1.75 1.75 0 0 1 0 3.5Zm0-2a.25.25 0 1 0 0 .5.25.25 0 0 0 0-.5Z"></path>
              <path d="M6.31 6h14.44l-1.47 7.35a2.25 2.25 0 0 1-2.21 1.8H9.44a2.25 2.25 0 0 1-2.2-1.79L5.18 3.75H3.25v-1.5h3.14l.58 2.25Zm1.18 1.5 1.2 5.17a.75.75 0 0 0 .73.59h7.64a.75.75 0 0 0 .74-.6l1.08-5.16H7.49Z"></path>
            </svg>
            <span class="cart-count-badge">0</span>
            <span class="sr-only">Cart</span>
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <div class="hero-video-bg">
          <video
            class="hero-video-element"
            autoplay
            muted
            loop
            playsinline
            aria-hidden="true">
            <source src="../assets/videos/hero-bg.mp4" type="video/mp4">
          </video>
          <div class="hero-video-overlay"></div>
          <div class="hero-video-text" aria-label="Hero message">INHALE PASSION</div>
        </div>
      </section>

      <section class="section fade-in">
        <div class="section-head">
          <div>
            <h2>Class Offers</h2>
          </div>
        </div>
        <div class="class-grid">
          <article class="class-card fade-in">
            <div class="toolbar">
              <span class="pill success">HIIT</span>
              <span class="pill success">Offer</span>
            </div>
            <img class="class-photo" src="https://www.trxtraining.com/cdn/shop/articles/mma-fighter-workout-training-plan_e5c7f6f7-c3d0-4410-8af7-e2a02397c967.jpg?v=1775795865" alt="MMA Championship Training" loading="lazy" />
            <h3>MMA Championship Training</h3>
            <p style="color: var(--text-primary); font-weight: 700; margin-top: 6px;">Price: LE 1200</p>
            <div class="inline-actions">
              <button class="btn btn-primary" data-book-class="1" data-class-fee="1200" style="flex: 1;">Book & Pay LE 1200</button>
            </div>
          </article>

          <article class="class-card fade-in">
            <div class="toolbar">
              <span class="pill success">Strength</span>
              <span class="pill success">Offer</span>
            </div>
            <img class="class-photo" src="https://trugrit-fitness.com/cdn/shop/articles/Fo7_-Q0g.jpg?crop=center&height=1200&v=1638407838&width=1200" alt="Barbell Mastery" loading="lazy" />
            <h3>Barbell Mastery</h3>
            <p style="color: var(--text-primary); font-weight: 700; margin-top: 6px;">Price: LE 1000</p>
            <div class="inline-actions">
              <button class="btn btn-primary" data-book-class="2" data-class-fee="1000" style="flex: 1;">Book & Pay LE 1000</button>
            </div>
          </article>

          <article class="class-card fade-in">
            <div class="toolbar">
              <span class="pill success">Recovery</span>
              <span class="pill success">Offer</span>
            </div>
            <img class="class-photo" src="../assets/images/mobility-flow.jpg" alt="Mobility Flow" loading="lazy" />
            <h3>Mobility Flow</h3>
            <p style="color: var(--text-primary); font-weight: 700; margin-top: 6px;">Price: LE 1000</p>
            <div class="inline-actions">
              <button class="btn btn-primary" data-book-class="3" data-class-fee="1000" style="flex: 1;">Book & Pay LE 1000</button>
            </div>
          </article>

          <article class="class-card fade-in">
            <div class="toolbar">
              <span class="pill success">Combat</span>
              <span class="pill success">Offer</span>
            </div>
            <img class="class-photo" src="https://americangym.com/wp-content/uploads/boxing7.webp" alt="Boxing Supremacy" loading="lazy" />
            <h3>Boxing Supremacy</h3>
            <p style="color: var(--text-primary); font-weight: 700; margin-top: 6px;">Price: LE 1500</p>
            <div class="inline-actions">
              <button class="btn btn-primary" data-book-class="4" data-class-fee="1500" style="flex: 1;">Book & Pay LE 1500</button>
            </div>
          </article>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
